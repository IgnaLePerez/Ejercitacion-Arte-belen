<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="header">
        <h1 id="titulo">Formulario de verificación de viaje a Londres</h1>
    </header>
    <main id="main" estado="claro">
        <button id="btnCambiarModo" class="botonNocturno" onclick="cambiarModo()">Cambiar Modo</button>
        <div id="formulario" class="Formulario">
            <label id="labelNombre" for="nombre">Nombre:</label> <br>
            <input type="text" id="nombre"> <br>
            <p id="nombre-error" hidden>El nombre es obligatorio.</p> <br>

            <label id="labelEdad" for="edad">Edad:</label> <br>
            <input type="number" id="edad" min="0" max="100"> <br>
            <p id="edad-error" hidden>La edad debe ser un número entre 14 y 17.</p> <br>

            <label id="labelNota1" for="nota1">Nota promedio de inglés primer año:</label> <br>
            <input type="number" id="nota1" min="0" max="10"> <br>
            <p id="nota1-error" hidden>La nota debe ser mayor a 8.</p> <br>

            <label id="labelNota2" for="nota2">Nota promedio de inglés segundo año:</label> <br>
            <input type="number" id="nota2" min="0" max="10"> <br>
            <p id="nota2-error" hidden>La nota debe ser mayor a 8.</p> <br>

            <label id="labelTemas" for="temas">Temas aprobados:</label> <br>
            <select id="temas">
                <option value="L">Listening</option>
                <option value="W">Writing</option>
                <option value="A">Ambos</option>
            </select> <br>
            <p id="temas-error" hidden>Debe seleccionar ambos temas.</p> <br>

            <input class="checkbox" type="checkbox" id="viaje">
            <label id="labelViaje" for="viaje">Desea realizar el viaje a Londres:</label> <br>
            <p id="viaje-error" hidden>Debe aceptar ir al viaje.</p> <br>

            <button id="btnEnviar" onclick="verificarDatos()">Enviar</button>
        </div>
    </main>
    <script src="javaS.js"></script>
</body>
</html>
